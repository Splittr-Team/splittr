name: splittr
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.12.0 <4.0.0'
  flutter: '3.44.0'

dependencies:
  cupertino_icons: ^1.0.6

  envied: ^1.3.8

  firebase_auth: ^6.0.0
  firebase_core: ^4.0.0

  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  freezed_annotation: ^3.1.0

  get_it: ^9.1.1

  hive_ce: ^2.19.3
  hive_ce_generator: ^1.11.1
  injectable: ^3.0.0

  intl: ^0.20.2

  json_annotation: ^4.12.0

  lottie: ^3.1.2

  recase: 4.1.0

  retrofit: ^4.9.2

  rxdart: ^0.28.0

  sky_architecture: ^1.7.0
  sky_bloc: ^2.2.0
  sky_design_system: ^1.7.2
  sky_devtools: ^1.1.0
  sky_network: ^1.1.10
  sky_router: ^1.1.3
  sky_storage: ^1.0.3
  sky_storage_hive: ^1.0.3
  sky_telemetry: ^1.1.1
  sky_utils: ^1.0.2

  uuid: ^4.4.2

dev_dependencies:
  build_runner: ^2.4.12

  envied_generator: ^1.3.8

  flutter_test:
    sdk: flutter

  freezed: ^3.2.0

  injectable_generator: ^3.0.2

  json_serializable: ^6.8.0

  mocktail: ^1.0.5

  retrofit_generator: ^10.2.7

  sky_lints: ^1.1.2

flutter:
  generate: true
  uses-material-design: true

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Bold.ttf
        - asset: assets/fonts/Poppins-ExtraBold.ttf
        - asset: assets/fonts/Poppins-Light.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-SemiBold.ttf
  assets:
    - assets/fonts/
    - assets/icons/
    - assets/images/
    - assets/animations/
