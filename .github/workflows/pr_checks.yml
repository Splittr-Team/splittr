name: PR Quality Checks

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    name: Run Analysis & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          cache: true

      - name: Setup Environment Variables
        run: |
          cp .env.dev.example .env.dev
          cp .env.prod.example .env.prod

      - name: Setup Firebase Options
        run: |
          cp lib/core/firebase/firebase_options_dev.dart.example lib/core/firebase/firebase_options_dev.dart
          cp lib/core/firebase/firebase_options_prod.dart.example lib/core/firebase/firebase_options_prod.dart

      - name: Install Dependencies
        run: flutter pub get

      - name: Run Build Runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Verify Code Formatting
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Run Static Analysis
        run: flutter analyze

      - name: Run Unit & Widget Tests
        run: flutter test
